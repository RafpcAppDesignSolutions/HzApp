name: Release build

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name HzApp --icon hz_power_switcher.ico --add-data "hz_power_switcher.ico;." --hidden-import pystray --hidden-import PIL.Image --hidden-import PIL.ImageDraw --hidden-import PIL.ImageFont hz_power_switcher.py

      - name: Create portable zip
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist\HzApp.exe release\
          Copy-Item README.md release\
          Copy-Item LICENSE release\
          Compress-Archive -Path release\* -DestinationPath HzApp-portable.zip -Force

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HzApp.exe
            HzApp-portable.zip
